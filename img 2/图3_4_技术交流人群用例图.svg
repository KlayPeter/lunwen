<svg xmlns="http://www.w3.org/2000/svg" width="950" height="650" viewBox="0 0 950 650" style="background-color:#FFFFFF; font-family: Arial, sans-serif;">
    <defs>
        <marker id="arrow_open" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M 0 1 L 8 5 L 0 9" fill="none" stroke="#333333" stroke-width="1.5" stroke-linejoin="round" />
        </marker>
    </defs>

    <!-- System Boundary -->
    <rect x="220" y="40" width="510" height="560" fill="none" stroke="#333333" stroke-width="2" />
    <text x="235" y="75" font-size="16" font-weight="bold" fill="#333333" text-anchor="start">智能聊天室系统</text>

    <!-- Connectors: Left Actor to Use Cases -->
    <path d="M 140 300 L 285 120" stroke="#333333" stroke-width="1.5" fill="none" />
    <path d="M 140 300 L 285 190" stroke="#333333" stroke-width="1.5" fill="none" />
    <path d="M 140 300 L 285 260" stroke="#333333" stroke-width="1.5" fill="none" />
    <path d="M 140 300 L 285 330" stroke="#333333" stroke-width="1.5" fill="none" />
    <path d="M 140 300 L 285 400" stroke="#333333" stroke-width="1.5" fill="none" />
    <path d="M 140 300 L 285 470" stroke="#333333" stroke-width="1.5" fill="none" />

    <!-- Connectors: Right Actor to AI Use Cases -->
    <path d="M 810 300 L 685 435" stroke="#333333" stroke-width="1.5" fill="none" />

    <!-- Left Actor: 技术交流用户 -->
    <g id="actor-left">
        <circle cx="100" cy="270" r="16" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
        <path d="M 100 286 L 100 340 M 70 300 L 130 300 M 100 340 L 80 380 M 100 340 L 120 380" stroke="#333333" stroke-width="2" fill="none" />
        <text x="100" y="410" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">技术交流用户</text>
    </g>

    <!-- Right Actor: AI服务 -->
    <g id="actor-right">
        <circle cx="850" cy="270" r="16" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
        <path d="M 850 286 L 850 340 M 820 300 L 880 300 M 850 340 L 830 380 M 850 340 L 870 380" stroke="#333333" stroke-width="2" fill="none" />
        <text x="850" y="410" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">AI服务</text>
    </g>

    <!-- Use Cases -->
    <ellipse cx="370" cy="120" rx="85" ry="26" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="370" y="120" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">创建专题聊天室</text>

    <!-- 发起求助及其 include -->
    <ellipse cx="370" cy="190" rx="85" ry="26" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="370" y="190" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">发起技术求助</text>

    <ellipse cx="610" cy="190" rx="90" ry="26" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="610" y="190" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">发送代码/日志/文件</text>

    <!-- Include Dependency (Base to Included) -->
    <path d="M 455 190 L 515 190" stroke="#333333" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow_open)" />
    <text x="485" y="180" font-size="12" fill="#333333" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>

    <ellipse cx="370" cy="260" rx="85" ry="26" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="370" y="260" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">标记问题/最佳答案</text>

    <ellipse cx="370" cy="330" rx="85" ry="26" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="370" y="330" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">收藏关键结论</text>

    <!-- 检索与请求AI及其 extend -->
    <ellipse cx="370" cy="400" rx="85" ry="26" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="370" y="400" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">检索历史讨论</text>

    <ellipse cx="370" cy="470" rx="85" ry="26" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="370" y="470" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">生成讨论总结</text>

    <ellipse cx="600" cy="435" rx="85" ry="26" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="600" y="435" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">请求AI辅助</text>

    <!-- Extend Dependencies (Extending to Base) -->
    <path d="M 515 425 L 460 410" stroke="#333333" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow_open)" />
    <text x="495" y="405" font-size="12" fill="#333333" text-anchor="middle">&lt;&lt;extend&gt;&gt;</text>

    <path d="M 515 445 L 460 460" stroke="#333333" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow_open)" />
    <text x="495" y="468" font-size="12" fill="#333333" text-anchor="middle">&lt;&lt;extend&gt;&gt;</text>

</svg>
