<?xml version="1.0" encoding="UTF-8" standalone="yes"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.2" baseProfile="tiny" x="0" y="0" width="500" height="400" viewBox="0 0 500 400"><defs/><rect fill="#add8e6" stroke="#000000" x="10" y="30" width="150" height="50"/><text fill="#000000" font-family="Arial" font-size="14" x="40" y="60"><tspan>客户端</tspan></text><rect fill="#90ee90" stroke="#000000" x="340" y="30" width="150" height="50"/><text fill="#000000" font-family="Arial" font-size="14" x="370" y="60"><tspan>服务器</tspan></text><line stroke="#000000" stroke-width="2" x1="160" y1="55" x2="340" y2="55"/><text fill="#000000" font-family="Arial" font-size="12" x="200" y="45"><tspan>1. POST /api/auth/login</tspan></text><text fill="#000000" font-family="Arial" font-size="12" x="200" y="60"><tspan>{email, password}</tspan></text><line stroke="#000000" stroke-width="2" x1="340" y1="80" x2="340" y2="130"/><text fill="#000000" font-family="Arial" font-size="12" x="355" y="110"><tspan>2. 验证凭证</tspan></text><text fill="#000000" font-family="Arial" font-size="12" x="355" y="125"><tspan>3. 生成JWT令牌</tspan></text><line stroke="#000000" stroke-width="2" x1="340" y1="155" x2="160" y2="155"/><text fill="#000000" font-family="Arial" font-size="12" x="200" y="145"><tspan>4. 返回JWT令牌</tspan></text><line stroke="#000000" stroke-width="2" x1="160" y1="180" x2="160" y2="230"/><text fill="#000000" font-family="Arial" font-size="12" x="180" y="210"><tspan>5. 保存令牌到LocalStorage</tspan></text><line stroke="#000000" stroke-width="2" x1="160" y1="250" x2="340" y2="250"/><text fill="#000000" font-family="Arial" font-size="12" x="200" y="240"><tspan>6. 后续请求携带令牌</tspan></text><text fill="#000000" font-family="Arial" font-size="12" x="200" y="255"><tspan>Authorization: Bearer &lt;token&gt;</tspan></text><line stroke="#000000" stroke-width="2" x1="340" y1="270" x2="340" y2="320"/><text fill="#000000" font-family="Arial" font-size="12" x="355" y="300"><tspan>7. 验证令牌</tspan></text><text fill="#000000" font-family="Arial" font-size="12" x="355" y="315"><tspan>8. 处理请求</tspan></text><line stroke="#000000" stroke-width="2" x1="340" y1="330" x2="160" y2="330"/><text fill="#000000" font-family="Arial" font-size="12" x="200" y="320"><tspan>9. 返回响应数据</tspan></text></svg>
