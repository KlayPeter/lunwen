<svg xmlns="http://www.w3.org/2000/svg" width="650" height="850" viewBox="0 0 650 850" style="background-color:#FFFFFF; font-family: Arial, sans-serif;">
    <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" />
        </marker>
        <marker id="arr_open" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 1 L 8 5 L 0 9" fill="none" stroke="#333333" stroke-width="1.5" />
        </marker>
    </defs>

    <!-- ======== Nodes ======== -->
    <!-- 1. 开始 -->
    <ellipse cx="250" cy="40" rx="50" ry="20" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="250" y="40" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">开始</text>

    <!-- 2. 发起收藏 -->
    <rect x="130" y="90" width="240" height="40" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="250" y="110" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central">发起收藏</text>

    <!-- 3. 读取原始消息 -->
    <rect x="130" y="160" width="240" height="40" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="250" y="180" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central">读取原始消息</text>

    <!-- 4. 读取发送者基本信息 -->
    <rect x="130" y="230" width="240" height="40" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="250" y="250" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central">读取发送者信息</text>

    <!-- 5. 构造收藏快照 -->
    <rect x="110" y="300" width="280" height="60" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="250" y="320" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">构造包含完整内容的收藏快照</text>
    <text x="250" y="340" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central">(正文 / 代码 / 附件数据等)</text>

    <!-- 5.1 快照机制特别标注 -->
    <path d="M 390 330 L 430 330" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,2" fill="none" />
    <rect x="430" y="295" width="180" height="70" rx="6" fill="#F9F9F9" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,2" />
    <text x="520" y="315" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">【核心设计约束】</text>
    <text x="520" y="335" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="central">深度拷贝实体内容</text>
    <text x="520" y="352" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central">解耦：防源消息删除覆盖</text>

    <!-- 6. 补充标签与备注 -->
    <rect x="130" y="400" width="240" height="40" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="250" y="420" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central">补充标签与备注</text>

    <!-- 7. 保存 Favorite 记录 -->
    <rect x="130" y="470" width="240" height="40" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="250" y="490" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">保存 Favorite 持久化记录</text>

    <!-- 8. 后续按关键词或标签筛选 -->
    <rect x="130" y="540" width="240" height="40" rx="6" fill="#E8E8E8" stroke="#333333" stroke-width="2" />
    <text x="250" y="560" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central">按关键词/标签筛选收藏</text>

    <!-- 9. 打开收藏详情 -->
    <rect x="130" y="610" width="240" height="40" rx="6" fill="#E8E8E8" stroke="#333333" stroke-width="2" />
    <text x="250" y="630" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central">打开收藏详情面板</text>

    <!-- 10. 回溯消息来源 -->
    <rect x="130" y="680" width="240" height="40" rx="6" fill="#E8E8E8" stroke="#333333" stroke-width="2" />
    <text x="250" y="700" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">回溯原始消息上下游</text>

    <!-- 11. 结束 -->
    <ellipse cx="250" cy="780" rx="50" ry="20" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="250" y="780" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">结束</text>


    <!-- ======== Edges ======== -->
    <path d="M 250 60 L 250 90" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 250 130 L 250 160" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 250 200 L 250 230" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 250 270 L 250 300" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    
    <path d="M 250 360 L 250 400" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 250 440 L 250 470" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    
    <!-- Time gap context switch -->
    <path d="M 250 510 L 250 540" stroke="#333333" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arr)" />
    <text x="290" y="525" font-size="12" fill="#333333">后期查阅</text>

    <path d="M 250 580 L 250 610" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 250 650 L 250 680" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 250 720 L 250 760" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />

</svg>
