    <text x="125" y="68" font-size="15" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="middle">接入端</text>

    <rect x="45" y="120" width="160" height="36" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
