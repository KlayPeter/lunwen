    <text x="970" y="117" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="middle">MongoDB</text>

    <rect x="885" y="146" width="170" height="34" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
    <text x="970" y="163" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="middle">Uploads</text>

    <rect x="885" y="192" width="170" height="34" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
    <text x="970" y="209" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="middle">MessageIndexer</text>

    <rect x="885" y="238" width="170" height="34" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
    <text x="970" y="255" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="middle">RAGService</text>

    <rect x="885" y="284" width="170" height="34" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
    <text x="970" y="301" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="middle">VectorSearchTool</text>

    <rect x="885" y="330" width="170" height="34" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
    <text x="970" y="347" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="middle">DeepSeek API</text>

    <!-- ====== Horizontal Arrows Between Columns ====== -->
    <path d="M 220 180 L 240 180" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 430 180 L 450 180" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 640 180 L 660 180" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 850 180 L 870 180" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />

    <path d="M 220 250 L 240 250" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 430 250 L 450 250" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 640 250 L 660 250" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 850 250 L 870 250" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />

    <!-- ====== Bottom Legend ====== -->
    <rect x="30" y="490" width="1040" height="100" rx="0" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="50" y="515" font-size="14" font-weight="bold" fill="#333333" dominant-baseline="middle">链路说明</text>

    <!-- Link 1: 普通请求 -->
    <path d="M 50 545 L 110 545" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <text x="125" y="545" font-size="13" fill="#333333" dominant-baseline="middle">普通请求链路：客户端 → RESTful API → 业务服务 → MongoDB</text>

    <!-- Link 2: 实时通信 -->
    <path d="M 50 570 L 110 570" stroke="#333333" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arr)" />
    <text x="125" y="570" font-size="13" fill="#333333" dominant-baseline="middle">实时通信链路：客户端 ↔ Socket.IO ↔ 消息广播 → MongoDB 持久化</text>

    <!-- Link 3: 智能问答 -->
    <path d="M 570 545 L 630 545" stroke="#333333" stroke-width="3" fill="none" marker-end="url(#arr)" />
    <text x="645" y="545" font-size="13" fill="#333333" dominant-baseline="middle">智能问答链路：用户提问 → AI控制器 → RAG/DeepSeek → 回写消息</text>

    <!-- Link 4: 知识沉淀 -->
    <path d="M 570 570 L 630 570" stroke="#333333" stroke-width="2" stroke-dasharray="2,4" fill="none" marker-end="url(#arr)" />
    <text x="645" y="570" font-size="13" fill="#333333" dominant-baseline="middle">知识沉淀链路：收藏/标签 → MongoDB → VectorSearch 检索复用</text>

</svg>
