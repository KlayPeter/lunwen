<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
  </marker>
  <style>
    .label, .note {
      font-family: "Microsoft YaHei", "Noto Sans SC", "PingFang SC", sans-serif;
      fill: #111111;
    }
    .box {
      fill: #ffffff;
      stroke: #111111;
      stroke-width: 2.1;
    }
    .subbox {
      fill: #f7f7f7;
      stroke: #111111;
      stroke-width: 1.6;
    }
    .header {
      fill: #eaeaea;
      stroke: #111111;
      stroke-width: 2.1;
    }
    .boundary {
      fill: #ffffff;
      stroke: #111111;
      stroke-width: 2.2;
    }
    .lane {
      fill: #ffffff;
      stroke: #8a8a8a;
      stroke-width: 1.4;
      stroke-dasharray: 8 6;
    }
    .lane-header {
      fill: #efefef;
      stroke: #111111;
      stroke-width: 1.4;
    }
    .usecase {
      fill: #ffffff;
      stroke: #111111;
      stroke-width: 2.0;
    }
    .decision {
      fill: #ffffff;
      stroke: #111111;
      stroke-width: 2.0;
    }
    .line {
      stroke: #111111;
      stroke-width: 2.0;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .actor-line {
      stroke: #111111;
      stroke-width: 2.0;
      fill: none;
      stroke-linecap: round;
    }
  </style>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<rect x="40" y="140" width="160" height="48" rx="14" class="header"/><text text-anchor="middle" font-size="18" font-weight="500" class="label"><tspan x="120.0" y="170.3">用户</tspan></text><line x1="120" y1="188" x2="120" y2="900" class="line" stroke-dasharray="10 7"/><rect x="340" y="140" width="160" height="48" rx="14" class="header"/><text text-anchor="middle" font-size="18" font-weight="500" class="label"><tspan x="420.0" y="170.3">前端页面</tspan></text><line x1="420" y1="188" x2="420" y2="900" class="line" stroke-dasharray="10 7"/><rect x="680" y="140" width="160" height="48" rx="14" class="header"/><text text-anchor="middle" font-size="18" font-weight="500" class="label"><tspan x="760.0" y="158.3">ChatRoomAI</tspan><tspan x="760.0" y="182.3">Controller</tspan></text><line x1="760" y1="188" x2="760" y2="900" class="line" stroke-dasharray="10 7"/><rect x="1000" y="140" width="160" height="48" rx="14" class="header"/><text text-anchor="middle" font-size="18" font-weight="500" class="label"><tspan x="1080.0" y="158.3">VectorSear</tspan><tspan x="1080.0" y="182.3">chTool</tspan></text><line x1="1080" y1="188" x2="1080" y2="900" class="line" stroke-dasharray="10 7"/><rect x="1300" y="140" width="160" height="48" rx="14" class="header"/><text text-anchor="middle" font-size="18" font-weight="500" class="label"><tspan x="1380.0" y="170.3">大模型接口</tspan></text><line x1="1380" y1="188" x2="1380" y2="900" class="line" stroke-dasharray="10 7"/><rect x="1560" y="140" width="160" height="48" rx="14" class="header"/><text text-anchor="middle" font-size="18" font-weight="500" class="label"><tspan x="1640.0" y="170.3">消息存储</tspan></text><line x1="1640" y1="188" x2="1640" y2="900" class="line" stroke-dasharray="10 7"/><line x1="120" y1="220" x2="420" y2="220" class="line" marker-end="url(#arrow)"/><text x="270.0" y="210" text-anchor="middle" font-size="16" font-weight="600" class="label">1. 提交问题</text><line x1="420" y1="280" x2="760" y2="280" class="line" marker-end="url(#arrow)"/><text x="590.0" y="270" text-anchor="middle" font-size="16" font-weight="600" class="label">2. 调用 askAI / askAIStream</text><line x1="760" y1="340" x2="1080" y2="340" class="line" marker-end="url(#arrow)"/><text x="920.0" y="330" text-anchor="middle" font-size="16" font-weight="600" class="label">3. 检索历史消息</text><line x1="1080" y1="400" x2="760" y2="400" class="line" stroke-dasharray="10 7" marker-end="url(#arrow)"/><text x="920.0" y="390" text-anchor="middle" font-size="16" font-weight="600" class="label">4. 返回相似上下文</text><line x1="760" y1="470" x2="1380" y2="470" class="line" marker-end="url(#arrow)"/><text x="1070.0" y="460" text-anchor="middle" font-size="16" font-weight="600" class="label">5. 组织提示词并调用模型</text><line x1="1380" y1="540" x2="760" y2="540" class="line" stroke-dasharray="10 7" marker-end="url(#arrow)"/><text x="1070.0" y="530" text-anchor="middle" font-size="16" font-weight="600" class="label">6. 返回回答内容</text><line x1="760" y1="610" x2="1640" y2="610" class="line" marker-end="url(#arrow)"/><text x="1200.0" y="600" text-anchor="middle" font-size="16" font-weight="600" class="label">7. 写入 AI 消息 / 总结记录</text><line x1="760" y1="700" x2="420" y2="700" class="line" stroke-dasharray="10 7" marker-end="url(#arrow)"/><text x="590.0" y="690" text-anchor="middle" font-size="16" font-weight="600" class="label">8. 返回流式或完整响应</text><line x1="420" y1="780" x2="120" y2="780" class="line" stroke-dasharray="10 7" marker-end="url(#arrow)"/><text x="270.0" y="770" text-anchor="middle" font-size="16" font-weight="600" class="label">9. 渲染回复并更新聊天界面</text>
