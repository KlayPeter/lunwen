<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="920" viewBox="0 0 1700 920">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
  </marker>
  <style>
    .label, .note {
      font-family: "Microsoft YaHei", "Noto Sans SC", "PingFang SC", sans-serif;
      fill: #111111;
    }
    .box {
      fill: #ffffff;
      stroke: #111111;
      stroke-width: 2.1;
    }
    .subbox {
      fill: #f7f7f7;
      stroke: #111111;
      stroke-width: 1.6;
    }
    .header {
      fill: #eaeaea;
      stroke: #111111;
      stroke-width: 2.1;
    }
    .boundary {
      fill: #ffffff;
      stroke: #111111;
      stroke-width: 2.2;
    }
    .lane {
      fill: #ffffff;
      stroke: #8a8a8a;
      stroke-width: 1.4;
      stroke-dasharray: 8 6;
    }
    .lane-header {
      fill: #efefef;
      stroke: #111111;
      stroke-width: 1.4;
    }
    .usecase {
      fill: #ffffff;
      stroke: #111111;
      stroke-width: 2.0;
    }
    .decision {
      fill: #ffffff;
      stroke: #111111;
      stroke-width: 2.0;
    }
    .line {
      stroke: #111111;
      stroke-width: 2.0;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .actor-line {
      stroke: #111111;
      stroke-width: 2.0;
      fill: none;
      stroke-linecap: round;
    }
  </style>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
