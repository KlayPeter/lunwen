<svg xmlns="http://www.w3.org/2000/svg" width="600" height="850" viewBox="0 0 600 850" style="background-color:#FFFFFF; font-family: Arial, sans-serif;">
    <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" />
        </marker>
    </defs>

    <!-- ======== Nodes ======== -->
    <!-- 1. 开始 -->
    <ellipse cx="300" cy="60" rx="60" ry="22" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="300" y="60" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">开始</text>

    <!-- 2. 选择认证方式 -->
    <rect x="220" y="130" width="160" height="40" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="300" y="150" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central">选择认证方式</text>

    <!-- 3. 判断: 是否为本地认证 -->
    <polygon points="300,220 370,250 300,280 230,250" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="300" y="243" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">是否为</text>
    <text x="300" y="258" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">本地认证？</text>

    <!-- 4. 左侧分支: 邮箱/验证码登录 -->
    <rect x="65" y="340" width="170" height="45" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="150" y="355" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central">邮箱密码登录</text>
    <text x="150" y="372" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central">(或) 验证码登录</text>

    <!-- 5. 右侧分支: OAuth登录 -->
    <rect x="365" y="340" width="170" height="45" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="450" y="362.5" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central">OAuth平台授权回调</text>

    <!-- 6. 统一生成JWT -->
    <rect x="220" y="470" width="160" height="40" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="300" y="490" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">统一生成 JWT</text>

    <!-- 7. 写入用户身份信息 -->
    <rect x="220" y="560" width="160" height="40" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="300" y="580" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central">写入用户身份信息</text>

    <!-- 8. 访问受保护资源 -->
    <rect x="220" y="650" width="160" height="40" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="300" y="670" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central">访问受保护资源</text>

    <!-- 9. 结束 -->
    <ellipse cx="300" cy="750" rx="60" ry="22" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="300" y="750" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="central">结束</text>

    <!-- ======== Edges ======== -->
    <path d="M 300 82 L 300 130" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    
    <path d="M 300 170 L 300 220" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />

    <!-- Diamond Left branch -->
    <path d="M 230 250 L 150 250 L 150 340" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <text x="180" y="240" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">是</text>

    <!-- Diamond Right branch -->
    <path d="M 370 250 L 450 250 L 450 340" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <text x="420" y="240" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">否</text>

    <!-- Path from Left to Merge -->
    <path d="M 150 385 L 150 430 L 300 430 L 300 470" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    
    <!-- Path from Right to Merge -->
    <path d="M 450 385 L 450 430 L 300 430 L 300 470" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <!-- Hide the overlap crossing issue by ending exactly -->

    <path d="M 300 510 L 300 560" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />

    <path d="M 300 600 L 300 650" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />

    <path d="M 300 690 L 300 728" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />

</svg>
