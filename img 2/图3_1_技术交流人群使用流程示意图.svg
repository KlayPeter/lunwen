<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="480" viewBox="0 0 1120 480" style="background-color:#FFFFFF; font-family: Arial, sans-serif;">
    <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" /></marker>
    </defs>

    <!-- User Actor (UML Stickman) -->
    <circle cx="80" cy="185" r="14" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <line x1="80" y1="199" x2="80" y2="235" stroke="#333333" stroke-width="2" />
    <line x1="55" y1="212" x2="105" y2="212" stroke="#333333" stroke-width="2" />
    <line x1="80" y1="235" x2="60" y2="260" stroke="#333333" stroke-width="2" />
    <line x1="80" y1="235" x2="100" y2="260" stroke="#333333" stroke-width="2" />
    <text x="80" y="280" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">技术交流用户</text>

    <!-- Main Flow Paths -->
    <path d="M 115 220 L 145 220" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 250 220 L 285 220" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 450 220 L 485 220" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 610 220 L 705 220" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 810 220 L 885 220" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />

    <!-- AI Loop Paths (No) -->
    <path d="M 1030 220 L 1060 220 L 1060 80 L 1025 80" stroke="#333333" stroke-width="2" fill="none" stroke-linejoin="round" marker-end="url(#arr)" />
    <text x="1075" y="150" font-size="14" fill="#333333" font-weight="bold" text-anchor="middle">否</text>
    
    <path d="M 900 80 L 760 80 L 760 190" stroke="#333333" stroke-width="2" fill="none" stroke-linejoin="round" marker-end="url(#arr)" />

    <!-- Yes Paths -->
    <path d="M 960 260 L 960 360" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <text x="975" y="310" font-size="14" fill="#333333" font-weight="bold">是</text>

    <path d="M 900 390 L 825 390" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />
    <path d="M 700 390 L 620 390" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arr)" />

    <!-- Main Boxes -->
    <!-- N1 -->
    <rect x="150" y="195" width="100" height="50" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="200" y="220" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="middle">进入系统</text>

    <!-- N2 -->
    <rect x="290" y="195" width="160" height="50" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="370" y="220" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="middle">选择群聊或专题聊天室</text>

    <!-- N3 -->
    <rect x="490" y="195" width="120" height="50" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="550" y="220" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="middle">提交问题上下文</text>
    <text x="550" y="265" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="middle">文本 / 代码 / 日志 / 文件</text>

    <!-- N4 -->
    <rect x="710" y="195" width="100" height="50" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="760" y="220" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="middle">协同讨论</text>
    <text x="760" y="265" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="middle">引用回复 / 问题标记 / 最佳答案</text>

    <!-- N5 Decision -->
    <polygon points="960,180 1030,220 960,260 890,220" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="960" y="210" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="middle">是否获得</text>
    <text x="960" y="230" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="middle">可行方案</text>

    <!-- N_AI -->
    <rect x="900" y="55" width="120" height="50" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="960" y="80" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="middle">AI补充分析</text>
    <text x="960" y="125" font-size="12" fill="#333333" opacity="0.8" text-anchor="middle" dominant-baseline="middle">RAG检索 / 代码解释 / 相似问题参考</text>

    <!-- N6 -->
    <rect x="900" y="365" width="120" height="50" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="960" y="390" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="middle">收藏关键消息</text>

    <!-- N7 -->
    <rect x="700" y="365" width="120" height="50" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="760" y="390" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="middle">生成阶段总结</text>

    <!-- N8 -->
    <rect x="485" y="365" width="130" height="50" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="550" y="390" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="middle">搜索与再次复用</text>

</svg>
