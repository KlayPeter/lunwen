      stroke: #111111;
      stroke-width: 2.0;
    }
    .line {
      stroke: #111111;
      stroke-width: 2.0;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .actor-line {
      stroke: #111111;
      stroke-width: 2.0;
      fill: none;
      stroke-linecap: round;
    }
  </style>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
