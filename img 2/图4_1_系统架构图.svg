    <text x="335" y="68" font-size="15" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="middle">前端应用层</text>

    <rect x="255" y="105" width="160" height="34" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
    <text x="335" y="122" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="middle">ChatView</text>

    <rect x="255" y="151" width="160" height="34" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
    <text x="335" y="168" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="middle">Content</text>

    <rect x="255" y="197" width="160" height="34" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
    <text x="335" y="214" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="middle">ChatRoom</text>

    <rect x="255" y="243" width="160" height="34" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
    <text x="335" y="260" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="middle">Favorites</text>

    <rect x="255" y="289" width="160" height="34" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
    <text x="335" y="306" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="middle">AIAssistantPanel</text>

    <!-- ====== Column 3: 接入协议层 ====== -->
    <rect x="450" y="50" width="190" height="400" rx="0" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <rect x="450" y="50" width="190" height="36" fill="#E8E8E8" stroke="#333333" stroke-width="2" />
    <text x="545" y="68" font-size="15" font-weight="bold" fill="#333333" text-anchor="middle" dominant-baseline="middle">接入协议层</text>

    <rect x="465" y="120" width="160" height="36" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
