    <rect x="870" y="50" width="200" height="400" rx="0" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <rect x="870" y="50" width="200" height="36" fill="#E8E8E8" stroke="#333333" stroke-width="2" />
