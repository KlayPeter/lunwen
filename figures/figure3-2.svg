0">收藏关键内容</tspan></text><rect x="320" y="890" width="260" height="92" rx="14" class="box"/><text text-anchor="middle" font-size="20" font-weight="500" class="label"><tspan x="450.0" y="929.5">查看收藏、总结</tspan><tspan x="450.0" y="956.5">与历史检索结果</tspan></text><rect x="710" y="890" width="360" height="92" rx="14" class="box"/><text text-anchor="middle" font-size="20" font-weight="500" class="label"><tspan x="890.0" y="929.5">保存标签、备注、总结</tspan><tspan x="890.0" y="956.5">供后续检索与复用</tspan></text><line x1="240" y1="145" x2="320" y2="145" class="line" marker-end="url(#arrow)"/><line x1="580" y1="145" x2="710" y2="145" class="line" marker-end="url(#arrow)"/><line x1="240" y1="285" x2="320" y2="285" class="line" marker-end="url(#arrow)"/><line x1="580" y1="285" x2="710" y2="285" class="line" marker-end="url(#arrow)"/><line x1="240" y1="425" x2="320" y2="425" class="line" marker-end="url(#arrow)"/><line x1="580" y1="425" x2="710" y2="425" class="line" marker-end="url(#arrow)"/><line x1="1070" y1="425" x2="1240" y2="425" class="line" marker-end="url(#arrow)"/><line x1="580" y1="470" x2="690" y2="470" class="line" marker-end="url(#arrow)"/><polyline points="920,630 920,730 890,730 890,760" fill="none" class="line" marker-end="url(#arrow)"/><text x="960" y="555" text-anchor="middle" font-size="16" font-weight="700" class="label">是</text><text x="1010" y="640" text-anchor="middle" font-size="16" font-weight="700" class="label">否</text><polyline points="1005,570 1180,570 1180,500 1240,500" fill="none" class="line" marker-end="url(#arrow)"/><line x1="1390" y1="542" x2="1390" y2="610" class="line" marker-end="url(#arrow)"/><polyline points="1240,660 1150,660 1150,806 1070,806" fill="none" class="line" marker-end="url(#arrow)"/><line x1="240" y1="936" x2="320" y2="936" class="line" marker-end="url(#arrow)"/><line x1="580" y1="936" x2="710" y2="936" class="line" marker-end="url(#arrow)"/>
