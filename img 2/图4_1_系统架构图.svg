    <rect x="675" y="176" width="160" height="36" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
    <text x="755" y="194" font-size="13" fill="#333333" text-anchor="middle" dominant-baseline="middle">收藏/上传/链接预览</text>

    <rect x="675" y="232" width="160" height="36" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" />
