<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650" style="background-color:#FFFFFF; font-family: Arial, sans-serif;">
    
    <!-- Titles -->
    <text x="435" y="45" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">桌面端界面结构布局</text>
    <text x="970" y="45" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">移动端简化布局</text>

    <!-- ====== Desktop Wireframe ====== -->
    <!-- X=60, Y=80, W=750, H=520 -->
    <rect x="60" y="80" width="750" height="520" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="3" />
    
    <!-- 1. 导航区 (Sidebar) -->
    <rect x="60" y="80" width="60" height="520" rx="8" fill="#F0F0F0" stroke="#333333" stroke-width="2" />
    <text transform="translate(95, 340) rotate(-90)" font-size="15" font-weight="bold" fill="#333333" text-anchor="middle" letter-spacing="4">导航区</text>

    <!-- 2. 会话/联系人/聊天室列表区 -->
    <rect x="120" y="80" width="200" height="520" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="220" y="115" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">会话 / 聊天室列表区</text>
    
    <rect x="135" y="140" width="170" height="60" rx="4" fill="#F9F9F9" stroke="#E8E8E8" stroke-width="1.5" />
    <rect x="135" y="210" width="170" height="60" rx="4" fill="#F9F9F9" stroke="#E8E8E8" stroke-width="1.5" />
    <rect x="135" y="280" width="170" height="60" rx="4" fill="#F9F9F9" stroke="#E8E8E8" stroke-width="1.5" />
    <rect x="135" y="350" width="170" height="60" rx="4" fill="#F9F9F9" stroke="#E8E8E8" stroke-width="1.5" />

    <!-- 3. 消息头部 -->
    <rect x="320" y="80" width="290" height="50" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="465" y="110" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">消息头部 (Header)</text>

    <!-- 4. 消息区 -->
    <rect x="320" y="130" width="290" height="350" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="465" y="160" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">消息展示区</text>
    
    <!-- Dummy messages in Desktop -->
    <rect x="340" y="190" width="140" height="40" rx="6" fill="#F0F0F0" stroke="none" />
    <rect x="450" y="250" width="140" height="60" rx="6" fill="#333333" stroke="none" />
    <rect x="340" y="330" width="180" height="40" rx="6" fill="#F0F0F0" stroke="none" />

    <!-- 5. 输入区 -->
    <rect x="320" y="480" width="290" height="120" rx="0" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <!-- Overriding bottom-right corner to match outer rx=8 -->
    <path d="M 320 600 L 610 600" stroke="#333333" stroke-width="3" />
    <text x="465" y="545" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">输入区</text>

    <!-- 6. 右侧扩展区 (AIAssistantPanel / Detail) -->
    <rect x="610" y="80" width="200" height="520" rx="8" fill="#F9F9F9" stroke="#333333" stroke-width="2" />
    <text x="710" y="115" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">右侧扩展区</text>

    <rect x="630" y="150" width="160" height="100" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,2" />
    <text x="710" y="200" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">AI 助手面板</text>

    <rect x="630" y="270" width="160" height="100" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,2" />
    <text x="710" y="320" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">群 / 房间详情</text>

    <rect x="630" y="390" width="160" height="100" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" stroke-dasharray="4,2" />
    <text x="710" y="440" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">收藏详情/总结面板</text>


    <!-- ====== Mobile Wireframe ====== -->
    <!-- X=880, Y=80, W=180, H=400 -->
    <rect x="880" y="80" width="180" height="400" rx="16" fill="#FFFFFF" stroke="#333333" stroke-width="3" />
    
    <!-- Top notch or speaker dummy -->
    <path d="M 940 80 Q 970 95 1000 80" fill="#333333" />

    <!-- 7. 顶部消息头 -->
    <rect x="880" y="80" width="180" height="45" rx="16" fill="#FFFFFF" />
    <rect x="880" y="80" width="180" height="45" fill="none" stroke="#333333" stroke-width="2" />
    <text x="970" y="110" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">顶部消息头</text>

    <!-- 8. 消息区 -->
    <rect x="880" y="125" width="180" height="250" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="970" y="155" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">消息区</text>

    <!-- Dummy mobile messages -->
    <rect x="895" y="180" width="80" height="30" rx="6" fill="#F0F0F0" stroke="none" />
    <rect x="965" y="230" width="80" height="50" rx="6" fill="#333333" stroke="none" />
    <rect x="895" y="300" width="110" height="40" rx="6" fill="#F0F0F0" stroke="none" />

    <!-- 9. 底部输入栏 -->
    <rect x="880" y="375" width="180" height="55" fill="#FFFFFF" stroke="#333333" stroke-width="2" />
    <text x="970" y="405" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">底部输入栏</text>
    
    <rect x="895" y="385" width="110" height="30" rx="15" fill="#F9F9F9" stroke="#E8E8E8" stroke-width="1.5" />
    <circle cx="1035" cy="400" r="14" fill="#333333" />

    <!-- 10. 底部导航 -->
    <rect x="880" y="430" width="180" height="50" rx="16" fill="#F0F0F0" stroke="#333333" stroke-width="2" />
    <text x="970" y="458" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">底部导航栏</text>

</svg>
